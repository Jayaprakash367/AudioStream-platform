apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: auralux
  labels: { app: recommendation-service, tier: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: recommendation-service }
  template:
    metadata:
      labels: { app: recommendation-service, tier: backend }
    spec:
      containers:
        - name: recommendation-service
          image: auralux/recommendation-service:latest
          ports: [{ containerPort: 3007, name: http }]
          envFrom:
            - configMapRef: { name: auralux-config }
            - secretRef: { name: auralux-secrets }
          env:
            - { name: PORT, value: "3007" }
            - { name: MONGO_URI, value: "mongodb://mongodb-0.mongodb-headless.auralux.svc.cluster.local:27017/auralux_recommendations" }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: auralux
spec:
  type: ClusterIP
  selector: { app: recommendation-service }
  ports: [{ port: 3007, targetPort: http, name: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recommendation-service-hpa
  namespace: auralux
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: recommendation-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
