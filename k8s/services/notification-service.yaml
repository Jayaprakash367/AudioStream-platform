apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: auralux
  labels: { app: notification-service, tier: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service, tier: backend }
    spec:
      containers:
        - name: notification-service
          image: auralux/notification-service:latest
          ports: [{ containerPort: 3009, name: http }]
          envFrom:
            - configMapRef: { name: auralux-config }
            - secretRef: { name: auralux-secrets }
          env:
            - { name: PORT, value: "3009" }
            - { name: MONGO_URI, value: "mongodb://mongodb-0.mongodb-headless.auralux.svc.cluster.local:27017/auralux_notifications" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: auralux
spec:
  type: ClusterIP
  selector: { app: notification-service }
  ports: [{ port: 3009, targetPort: http, name: http }]
