apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: auralux
  labels: { app: analytics-service, tier: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: analytics-service }
  template:
    metadata:
      labels: { app: analytics-service, tier: backend }
    spec:
      containers:
        - name: analytics-service
          image: auralux/analytics-service:latest
          ports: [{ containerPort: 3008, name: http }]
          envFrom:
            - configMapRef: { name: auralux-config }
            - secretRef: { name: auralux-secrets }
          env:
            - { name: PORT, value: "3008" }
            - { name: MONGO_URI, value: "mongodb://mongodb-0.mongodb-headless.auralux.svc.cluster.local:27017/auralux_analytics" }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: auralux
spec:
  type: ClusterIP
  selector: { app: analytics-service }
  ports: [{ port: 3008, targetPort: http, name: http }]
