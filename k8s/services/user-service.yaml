apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: auralux
  labels: { app: user-service, tier: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service, tier: backend }
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: user-service
          image: auralux/user-service:latest
          ports: [{ containerPort: 3002, name: http }]
          envFrom:
            - configMapRef: { name: auralux-config }
            - secretRef: { name: auralux-secrets }
          env:
            - { name: PORT, value: "3002" }
            - { name: MONGO_URI, value: "mongodb://mongodb-0.mongodb-headless.auralux.svc.cluster.local:27017/auralux_users" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: auralux
spec:
  type: ClusterIP
  selector: { app: user-service }
  ports: [{ port: 3002, targetPort: http, name: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: auralux
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: user-service }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
