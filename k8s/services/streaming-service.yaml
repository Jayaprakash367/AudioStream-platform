apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-service
  namespace: auralux
  labels: { app: streaming-service, tier: backend }
spec:
  replicas: 4
  selector:
    matchLabels: { app: streaming-service }
  template:
    metadata:
      labels: { app: streaming-service, tier: backend }
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: streaming-service
          image: auralux/streaming-service:latest
          ports: [{ containerPort: 3004, name: http }]
          envFrom:
            - configMapRef: { name: auralux-config }
            - secretRef: { name: auralux-secrets }
          env:
            - { name: PORT, value: "3004" }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-service
  namespace: auralux
spec:
  type: ClusterIP
  selector: { app: streaming-service }
  ports: [{ port: 3004, targetPort: http, name: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: streaming-service-hpa
  namespace: auralux
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: streaming-service }
  minReplicas: 4
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 75 } }
