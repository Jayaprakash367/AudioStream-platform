apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: auralux
  labels:
    app: realtime-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      containers:
        - name: realtime-service
          image: auralux/realtime-service:latest
          ports:
            - containerPort: 3010
              name: http
            - containerPort: 3010
              name: websocket
          env:
            - name: PORT
              value: "3010"
            - name: SERVICE_NAME
              value: "realtime-service"
            - name: LOG_LEVEL
              value: "info"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: auralux-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: auralux-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auralux-secrets
                  key: REDIS_PASSWORD
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: auralux-config
                  key: KAFKA_BROKERS
            - name: KAFKA_CLIENT_ID
              value: "realtime-service"
            - name: KAFKA_GROUP_ID
              value: "realtime-service-group"
            - name: WS_HEARTBEAT_INTERVAL
              value: "30000"
            - name: MAX_CONNECTIONS_PER_USER
              value: "5"
            - name: CORS_ORIGINS
              value: "*"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: auralux
spec:
  selector:
    app: realtime-service
  ports:
    - name: http
      port: 3010
      targetPort: 3010
    - name: websocket
      port: 3010
      targetPort: 3010
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: realtime-service-hpa
  namespace: auralux
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: realtime-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
