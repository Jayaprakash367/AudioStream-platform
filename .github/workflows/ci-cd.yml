name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/auralux

permissions:
  contents: read
  packages: write

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/common
          npm run build --workspace=packages/logger
          npm run build --workspace=packages/kafka-client
          npm run build --workspace=packages/redis-client

      - name: Typecheck all services
        run: |
          for svc in services/*/; do
            echo "Typechecking $svc..."
            npm run build --workspace="$svc" || exit 1
          done

  # ── Unit Tests ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7
        ports: [27017:27017]
      redis:
        image: redis:7-alpine
        ports: [6379:6379]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/common
          npm run build --workspace=packages/logger
          npm run build --workspace=packages/kafka-client
          npm run build --workspace=packages/redis-client

      - name: Run tests
        env:
          MONGO_URI: mongodb://localhost:27017/test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test --workspaces --if-present

  # ── Build & Push Docker Images ─────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - music-service
          - streaming-service
          - playlist-service
          - history-service
          - recommendation-service
          - analytics-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Frontend ─────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Helm Upgrade
        run: |
          helm upgrade --install auralux-x ./helm/auralux-x \
            --namespace auralux \
            --create-namespace \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --values helm/auralux-x/values.yaml \
            --wait \
            --timeout 10m

  # ── Deploy to Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Helm Upgrade (Production)
        run: |
          helm upgrade --install auralux-x ./helm/auralux-x \
            --namespace auralux \
            --create-namespace \
            --values helm/auralux-x/values.yaml \
            --values helm/auralux-x/values-production.yaml \
            --wait \
            --timeout 15m
