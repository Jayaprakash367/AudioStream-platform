version: "3.9"

# ═══════════════════════════════════════════════════════════════════════
# Auralux X – Local Development Orchestration
# ═══════════════════════════════════════════════════════════════════════
# Usage:  docker compose up -d
#         docker compose logs -f api-gateway
#         docker compose down -v
# ═══════════════════════════════════════════════════════════════════════

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [auralux]
  environment: &common-env
    NODE_ENV: development
    LOG_LEVEL: debug
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    KAFKA_BROKERS: "kafka:29092"
    CORS_ORIGIN: "*"
    JWT_SECRET: dev-jwt-secret-change-in-prod
    JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-prod
    STREAM_SIGNING_SECRET: dev-stream-signing-secret

services:

  # ── Infrastructure ─────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: auralux-mongo
    ports: ["27017:27017"]
    volumes: [mongo-data:/data/db]
    networks: [auralux]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auralux-redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [auralux]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auralux-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [auralux]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auralux-kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [auralux]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Observability ──────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: auralux-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [auralux]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: auralux-grafana
    ports: ["3100:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: auralux
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    networks: [auralux]
    depends_on: [prometheus]

  # ── Microservices ──────────────────────────────────────────────────

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: api-gateway }
    container_name: auralux-api-gateway
    ports: ["3000:3000"]
    environment:
      <<: *common-env
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      MUSIC_SERVICE_URL: http://music-service:3003
      STREAMING_SERVICE_URL: http://streaming-service:3004
      PLAYLIST_SERVICE_URL: http://playlist-service:3005
      HISTORY_SERVICE_URL: http://history-service:3006
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:3007
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      NOTIFICATION_SERVICE_URL: http://notification-service:3009
      REALTIME_SERVICE_URL: http://realtime-service:3010
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: auth-service }
    container_name: auralux-auth-service
    ports: ["3001:3001"]
    environment:
      <<: *common-env
      PORT: "3001"
      MONGO_URI: mongodb://mongodb:27017/auralux_auth
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  user-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: user-service }
    container_name: auralux-user-service
    ports: ["3002:3002"]
    environment:
      <<: *common-env
      PORT: "3002"
      MONGO_URI: mongodb://mongodb:27017/auralux_users
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  music-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: music-service }
    container_name: auralux-music-service
    ports: ["3003:3003"]
    environment:
      <<: *common-env
      PORT: "3003"
      MONGO_URI: mongodb://mongodb:27017/auralux_music
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  streaming-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: streaming-service }
    container_name: auralux-streaming-service
    ports: ["3004:3004"]
    environment:
      <<: *common-env
      PORT: "3004"
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  playlist-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: playlist-service }
    container_name: auralux-playlist-service
    ports: ["3005:3005"]
    environment:
      <<: *common-env
      PORT: "3005"
      MONGO_URI: mongodb://mongodb:27017/auralux_playlists
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  history-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: history-service }
    container_name: auralux-history-service
    ports: ["3006:3006"]
    environment:
      <<: *common-env
      PORT: "3006"
      MONGO_URI: mongodb://mongodb:27017/auralux_history
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  recommendation-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: recommendation-service }
    container_name: auralux-recommendation-service
    ports: ["3007:3007"]
    environment:
      <<: *common-env
      PORT: "3007"
      MONGO_URI: mongodb://mongodb:27017/auralux_recommendations
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  analytics-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: analytics-service }
    container_name: auralux-analytics-service
    ports: ["3008:3008"]
    environment:
      <<: *common-env
      PORT: "3008"
      MONGO_URI: mongodb://mongodb:27017/auralux_analytics
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  notification-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: notification-service }
    container_name: auralux-notification-service
    ports: ["3009:3009"]
    environment:
      <<: *common-env
      PORT: "3009"
      MONGO_URI: mongodb://mongodb:27017/auralux_notifications
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  realtime-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { SERVICE_NAME: realtime-service }
    container_name: auralux-realtime-service
    ports: ["3010:3010"]
    environment:
      <<: *common-env
      PORT: "3010"
      WS_HEARTBEAT_INTERVAL: "30000"
      WS_MAX_CLIENTS: "10000"
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  # ── Dev utilities ──────────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog:latest
    container_name: auralux-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks: [auralux]

volumes:
  mongo-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  auralux:
    driver: bridge
